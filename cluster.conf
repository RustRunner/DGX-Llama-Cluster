#!/usr/bin/env bash
# ─────────────────────────────────────────────────────────────
# DGX Spark Llama Cluster — Central Configuration
# ─────────────────────────────────────────────────────────────
# Edit these values to match your cluster layout.
# All setup scripts source this file automatically.
# ─────────────────────────────────────────────────────────────

# ── Cluster Size ─────────────────────────────────────────────
# Node 1 is always the head (runs llama-server).
# Nodes 2+ are workers (run rpc-server).
# To add a node: define NODE<N>_IP / NODE<N>_IP2 below,
# then increase NODE_COUNT.

NODE_COUNT=3

# ── Node Addresses ───────────────────────────────────────────
# Each node needs a primary and secondary RDMA IP.

NODE1_IP="192.168.200.11"
NODE1_IP2="192.168.201.11"

NODE2_IP="192.168.200.12"
NODE2_IP2="192.168.201.12"

# ── Third node (star topology — direct cable from Node 1's free port) ──
# NODE3_IP must be on the same subnet as NODE1_IP2 (Node 1's free port)
# NODE3_IP2 is unused (Node 3's other port has no cable) but must be defined
NODE3_IP="192.168.201.13"
NODE3_IP2="192.168.202.13"

# ── Network ──────────────────────────────────────────────────
MTU=9000                          # Jumbo frames for RDMA

# ── MLNX OFED ───────────────────────────────────────────────
OFED_VERSION="24.10-1.1.4.0"

# ── llama.cpp ────────────────────────────────────────────────
LLAMA_CPP_REPO="https://github.com/ggml-org/llama.cpp.git"
LLAMA_CPP_DIR="/opt/llama.cpp"
LLAMA_CPP_COMMIT=""               # Empty = track master (fast-forward each setup run).
                                  # Set to a SHA to pin — protects against upstream regressions
                                  # (e.g. chat-template parser changes that break a model). Bump
                                  # deliberately when you want new upstream features.
CUDA_ARCH=121                     # DGX Spark GB10 (Grace Blackwell)
ARM_CPU="neoverse-v2"             # Grace cores — enables DotProd/SVE2/I8MM/BF16/FP16
                                  # Empty/unset → cmake auto-detect (slower CPU paths)

# ── Ports ────────────────────────────────────────────────────
RPC_PORT=50052                    # rpc-server on each worker node
SERVER_PORT=8080                  # llama-server HTTP API on Node 1
